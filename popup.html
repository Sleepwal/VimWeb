<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vim Web Help</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Vim Web</h1>
      <span class="version">v0.2</span>
    </header>
    
    <div class="section">
      <h2>导航</h2>
      <ul class="key-list">
        <li>
          <kbd>j</kbd> <span>向下滚动</span>
        </li>
        <li>
          <kbd>k</kbd> <span>向上滚动</span>
        </li>
        <li>
          <kbd>h</kbd> <span>向左滚动</span>
        </li>
        <li>
          <kbd>l</kbd> <span>向右滚动</span>
        </li>
        <li>
          <kbd>gg</kbd> <span>回到顶部</span>
        </li>
        <li>
          <kbd>G</kbd> <span>直达底部</span>
        </li>
        <li>
          <kbd>Ctrl+d</kbd> <span>向下半页</span>
        </li>
        <li>
          <kbd>Ctrl+u</kbd> <span>向上半页</span>
        </li>
      </ul>
    </div>

    <div class="section">
      <h2>交互</h2>
      <ul class="key-list">
        <li>
          <kbd>f</kbd> <span>Hint 模式</span>
        </li>
        <li>
          <kbd>Space</kbd> <span>点击光标处</span>
        </li>
        <li>
          <kbd>q / Q</kbd> <span>返回上一页</span>
        </li>
        <li>
          <kbd>Esc</kbd> <span>退出模式</span>
        </li>
      </ul>
    </div>

    <div class="section">
      <h2>标签页</h2>
      <ul class="key-list">
        <li>
          <kbd>gt</kbd> <span>下一个标签页</span>
        </li>
        <li>
          <kbd>gT</kbd> <span>上一个标签页</span>
        </li>
        <li>
          <kbd>x</kbd> <span>关闭当前标签页</span>
        </li>
        <li>
          <kbd>X</kbd> <span>恢复关闭的标签页</span>
        </li>
      </ul>
    </div>

    <footer>
      <p>键盘即世界</p>
    </footer>
  </div>
</body>
</html>
